<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- shorter background bars (suppressed days) -->
  <g fill="#ff6b35" opacity="0.35">
    <rect x="80"  y="320" width="36" height="60" rx="3"/>
    <rect x="140" y="300" width="36" height="80" rx="3"/>
    <rect x="200" y="310" width="36" height="70" rx="3"/>
    <rect x="260" y="295" width="36" height="85" rx="3"/>
  </g>

  <!-- explosive volume bar (today, the burst) -->
  <rect x="330" y="160" width="56" height="220" rx="4" fill="#ff6b35"/>

  <!-- baseline reference line -->
  <line x1="60" y1="295" x2="440" y2="295" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6 6" opacity="0.5"/>

  <!-- lightning spike -->
  <path d="M 380 90 L 340 220 L 372 220 L 332 360" stroke="#ff3b30" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="332" cy="360" r="12" fill="#ff3b30"/>
</svg>
