<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="當沖掃描" />
  <title>當沖掃描 — Opening Volume Burst</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />

  <script>
    (function () {
      const h = location.hostname;
      const isLocal = h === '127.0.0.1' || h === 'localhost' || h === '';
      window.API_BASES = isLocal
        ? ['http://127.0.0.1:8080']
        : ['https://renegade-silliness-stony.ngrok-free.dev'];
    })();
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <style>
    :root {
      --bg: #0b0b0d;
      --bg-soft: #14141a;
      --brand: #ff6b35;
      --brand-dim: rgba(255, 107, 53, 0.18);
      --up: #ff3b30;
      --down: #00c853;
      --text: #f5f5f7;
      --text-dim: #98989f;
      --text-faint: #5e5e66;
      --surface: rgba(28, 28, 32, 0.72);
      --hairline: rgba(255, 255, 255, 0.08);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%; overscroll-behavior-y: contain;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC",
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background: radial-gradient(ellipse 80% 50% at 50% 0%,
                  rgba(255, 107, 53, 0.18), transparent 70%);
    }
    .num { font-variant-numeric: tabular-nums; }
    .mono { font-family: "SF Mono", ui-monospace, "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }

    #root {
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      max-width: 480px; margin: 0 auto; padding: 16px 14px 32px;
    }

    /* Header */
    .header {
      padding: 14px 4px 18px;
    }
    .title-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .title {
      font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
    }
    .title em {
      color: var(--brand); font-style: normal;
    }
    .subtitle {
      font-size: 13px; color: var(--text-dim); margin-top: 4px;
    }

    /* Status pill row */
    .status-row {
      margin: 14px 0 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      background: var(--surface); backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--hairline); font-size: 12px; color: var(--text-dim);
    }
    .pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .pill.open  .dot { background: var(--up); box-shadow: 0 0 8px var(--up); }
    .pill.close .dot { background: var(--text-faint); }
    .pill.pre   .dot { background: var(--brand); }
    .pill .label { color: var(--text); font-weight: 500; }
    .pill .num { color: var(--text-dim); }
    .pill.tap { cursor: pointer; }
    .pill.tap:active { transform: scale(0.97); }
    .pill.notif-cta {
      background: var(--brand-dim); border-color: var(--brand);
    }
    .pill.notif-cta .label { color: var(--brand); }
    .pill.notif-on .label { color: var(--up); }
    .pill.notif-off .label { color: var(--text-faint); }

    /* Strategy tabs */
    .strategy-tabs {
      display: flex; gap: 6px; margin: 16px 0 0;
      overflow-x: auto; padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .strategy-tabs::-webkit-scrollbar { display: none; }
    .strategy-tab {
      flex: 0 0 auto;
      background: var(--surface); backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid var(--hairline); border-radius: 12px;
      padding: 9px 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--text-dim); font-size: 13px; font-weight: 500;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .strategy-tab:active { transform: scale(0.97); }
    .strategy-tab.active {
      background: var(--brand-dim); border-color: var(--brand); color: var(--text);
    }
    .strategy-tab .tab-emoji { font-size: 14px; line-height: 1; }
    .strategy-tab .tab-label { font-variant-numeric: tabular-nums; }

    /* Threshold control */
    .threshold-card {
      margin: 16px 0 18px;
      background: var(--surface); backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid var(--hairline); border-radius: 16px;
      padding: 14px 16px; box-shadow: var(--shadow);
    }
    .threshold-head {
      display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px;
    }
    .threshold-label {
      font-size: 13px; color: var(--text-dim);
    }
    .threshold-value {
      font-size: 28px; font-weight: 700; color: var(--brand); letter-spacing: -0.02em;
    }
    .threshold-value small {
      font-size: 13px; color: var(--text-dim); font-weight: 500; margin-left: 4px;
    }
    .slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px;
      background: linear-gradient(to right, var(--brand) 0%, var(--brand) var(--pct, 0%), rgba(255,255,255,0.1) var(--pct, 0%), rgba(255,255,255,0.1) 100%);
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--brand); cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 107, 53, 0.5);
      border: 2px solid #fff;
    }
    .slider-ticks {
      display: flex; justify-content: space-between; margin-top: 6px;
      font-size: 11px; color: var(--text-faint);
    }

    /* List */
    .list-head {
      margin: 18px 4px 8px; display: flex; align-items: baseline; justify-content: space-between;
    }
    .list-title {
      font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .list-count {
      font-size: 13px; color: var(--text-faint);
    }
    .list-count em { color: var(--brand); font-style: normal; font-weight: 600; }

    /* Hit card */
    .hit {
      background: var(--surface); backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid var(--hairline); border-radius: 16px;
      padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow);
    }
    .hit-ratio {
      flex: 0 0 78px; text-align: center;
      background: var(--brand-dim); border: 1px solid var(--brand);
      border-radius: 12px; padding: 8px 4px;
    }
    .hit-ratio .v {
      font-size: 24px; font-weight: 700; color: var(--brand); line-height: 1;
    }
    .hit-ratio .u {
      font-size: 11px; color: var(--brand); opacity: 0.7; margin-top: 2px;
    }
    .hit-mid {
      flex: 1; min-width: 0;
    }
    .hit-name {
      font-size: 17px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hit-id {
      font-size: 12px; color: var(--text-dim); margin-left: 6px; font-weight: 500;
    }
    .hit-vol {
      font-size: 12px; color: var(--text-dim); margin-top: 4px;
    }
    .hit-vol .sep { margin: 0 6px; opacity: 0.5; }
    .hit-right { flex: 0 0 auto; text-align: right; }
    .hit-price {
      font-size: 16px; font-weight: 600;
    }
    .hit-change {
      font-size: 13px; margin-top: 2px;
    }
    .hit-change.up { color: var(--up); }
    .hit-change.down { color: var(--down); }
    .hit-change.flat { color: var(--text-dim); }

    /* States */
    .state {
      padding: 56px 24px; text-align: center; color: var(--text-dim);
    }
    .state-emoji { font-size: 40px; margin-bottom: 12px; opacity: 0.7; }
    .state-title { font-size: 16px; color: var(--text); font-weight: 600; margin-bottom: 6px; }
    .state-body { font-size: 13px; line-height: 1.6; max-width: 320px; margin: 0 auto; }

    .btn-retry {
      margin-top: 16px; padding: 10px 18px; border-radius: 999px;
      background: var(--brand); color: #fff; font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
    }
    .btn-retry:active { transform: scale(0.97); }

    /* Loading */
    .skel { background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Refresh spinner */
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.18); border-top-color: var(--brand);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      margin-top: 32px; padding: 16px 4px; text-align: center; font-size: 11px;
      color: var(--text-faint); border-top: 1px solid var(--hairline);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;
    const API_BASES = window.API_BASES;

    const STRATEGIES = [
      {
        id: 'opening-volume-burst', label: '量比爆量', emoji: '🔥',
        endpoint: '/api/daytrade/scan/opening-volume-burst',
        notifTitle: '🔥 開盤量比爆量',
        param: { key: 'threshold', default: 3.0, min: 1.5, max: 10, step: 0.5, label: '量比門檻', unit: '倍' },
        ticks: ['1.5x', '3x', '5x', '7x', '10x'],
      },
      {
        id: 'vwap-reversal', label: 'VWAP↗', emoji: '↗️',
        endpoint: '/api/daytrade/scan/vwap-reversal',
        notifTitle: '↗️ VWAP 反轉',
        param: { key: 'vol_mul', default: 1.5, min: 1.0, max: 5.0, step: 0.1, label: '量比 vs 5m 均量', unit: 'x' },
        ticks: ['1x', '2x', '3x', '4x', '5x'],
      },
      {
        id: 'gap-up-continuation', label: '跳空接力', emoji: '⏫',
        endpoint: '/api/daytrade/scan/gap-up-continuation',
        notifTitle: '⏫ 跳空接力',
        param: { key: 'gap_pct', default: 2.0, min: 1.0, max: 10, step: 0.5, label: '跳空門檻', unit: '%' },
        ticks: ['1%', '3%', '5%', '7%', '10%'],
      },
      {
        id: 'intraday-breakout', label: '盤中突破', emoji: '🚀',
        endpoint: '/api/daytrade/scan/intraday-breakout',
        notifTitle: '🚀 5分K 突破前高',
        param: { key: 'vol_mul', default: 1.0, min: 0.5, max: 5.0, step: 0.1, label: '量比 vs 前面均量', unit: 'x' },
        ticks: ['0.5x', '1x', '2x', '3x', '5x'],
      },
    ];

    const STRATEGY_BY_ID = Object.fromEntries(STRATEGIES.map(s => [s.id, s]));

    function apiFetch(path) {
      const ctl = new AbortController();
      const timer = setTimeout(() => ctl.abort(), 30000);
      const tryBase = async (i) => {
        if (i >= API_BASES.length) throw new Error('all bases failed');
        try {
          const r = await fetch(API_BASES[i] + path, {
            signal: ctl.signal,
            headers: { 'ngrok-skip-browser-warning': '1' },
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return await r.json();
        } catch (e) {
          if (e.name === 'AbortError') throw e;
          return tryBase(i + 1);
        }
      };
      return tryBase(0).finally(() => clearTimeout(timer));
    }

    function fmtVol(v) {
      if (!v && v !== 0) return '—';
      if (v >= 1e8) return (v / 1e8).toFixed(2) + '億';
      if (v >= 1e4) return Math.round(v / 1e4).toLocaleString() + '萬';
      return v.toLocaleString();
    }

    function fmtPrice(p) {
      if (p == null) return '—';
      return p.toFixed(2);
    }

    function fmtRelative(ts) {
      if (!ts) return '';
      const sec = Math.floor((Date.now() - ts) / 1000);
      if (sec < 5) return '剛剛';
      if (sec < 60) return `${sec} 秒前`;
      if (sec < 3600) return `${Math.floor(sec / 60)} 分前`;
      return `${Math.floor(sec / 3600)} 小時前`;
    }

    function useTick(ms) {
      const [, set] = useState(0);
      useEffect(() => {
        const t = setInterval(() => set(n => n + 1), ms);
        return () => clearInterval(t);
      }, [ms]);
    }

    function MarketPill({ status, marketOpen }) {
      let label, cls, emoji;
      if (status === 'pre-market') { label = '盤前'; cls = 'pre'; }
      else if (marketOpen) { label = '盤中'; cls = 'open'; }
      else { label = '盤後'; cls = 'close'; }
      return (
        <span className={`pill ${cls}`}>
          <span className="dot" /><span className="label">{label}</span>
        </span>
      );
    }

    function StrategyTabs({ selectedId, onSelect }) {
      return (
        <div className="strategy-tabs">
          {STRATEGIES.map(s => (
            <button
              key={s.id}
              className={`strategy-tab ${s.id === selectedId ? 'active' : ''}`}
              onClick={() => onSelect(s.id)}
            >
              <span className="tab-emoji">{s.emoji}</span>
              <span className="tab-label">{s.label}</span>
            </button>
          ))}
        </div>
      );
    }

    function ParamCard({ strategy, value, onChange }) {
      const p = strategy.param;
      const pct = ((value - p.min) / (p.max - p.min)) * 100;
      return (
        <div className="threshold-card">
          <div className="threshold-head">
            <span className="threshold-label">{p.label}</span>
            <span className="threshold-value num">
              {value.toFixed(p.step < 0.5 ? 1 : 1)}<small>{p.unit}</small>
            </span>
          </div>
          <input
            type="range" className="slider"
            min={p.min} max={p.max} step={p.step}
            value={value}
            onChange={(e) => onChange(parseFloat(e.target.value))}
            style={{ '--pct': pct + '%' }}
          />
          <div className="slider-ticks">
            {strategy.ticks.map((t, i) => <span key={i}>{t}</span>)}
          </div>
        </div>
      );
    }

    function HitCard({ hit, strategy }) {
      const cp = hit.change_pct;
      let chgCls = 'flat', chgTxt = '0.00%';
      if (cp != null) {
        if (cp > 0) { chgCls = 'up'; chgTxt = `+${cp.toFixed(2)}%`; }
        else if (cp < 0) { chgCls = 'down'; chgTxt = `${cp.toFixed(2)}%`; }
      }

      // 左側「主指標」+ 中間「細節」依策略而異
      let mainVal, mainUnit, midLine;
      switch (strategy.id) {
        case 'opening-volume-burst':
          mainVal = hit.volume_ratio?.toFixed(1) ?? '—';
          mainUnit = '倍量';
          midLine = `${fmtVol(hit.today_volume)} / 均 ${fmtVol(hit.baseline_volume)}`;
          break;
        case 'vwap-reversal':
          mainVal = hit.volume_ratio?.toFixed(1) ?? '—';
          mainUnit = '倍量';
          midLine = `VWAP ${hit.vwap?.toFixed(2)} · ${hit.vwap_diff_pct >= 0 ? '+' : ''}${hit.vwap_diff_pct?.toFixed(2)}%`;
          break;
        case 'gap-up-continuation':
          mainVal = '+' + (hit.gap_pct?.toFixed(1) ?? '—');
          mainUnit = '%跳空';
          midLine = `開 ${fmtPrice(hit.day_open)} · 守 ${fmtPrice(hit.early_low)}`;
          break;
        case 'intraday-breakout':
          mainVal = '+' + (hit.breakout_pct?.toFixed(2) ?? '—');
          mainUnit = '%突破';
          midLine = `過 ${fmtPrice(hit.breakout_from)} · 量比 ${hit.volume_ratio?.toFixed(1)}x`;
          break;
        default:
          mainVal = '—'; mainUnit = ''; midLine = '';
      }

      return (
        <div className="hit">
          <div className="hit-ratio">
            <div className="v num">{mainVal}</div>
            <div className="u">{mainUnit}</div>
          </div>
          <div className="hit-mid">
            <div className="hit-name">{hit.name}<span className="hit-id mono">{hit.id}</span></div>
            <div className="hit-vol mono">{midLine}</div>
          </div>
          <div className="hit-right">
            <div className="hit-price num">{fmtPrice(hit.price)}</div>
            <div className={`hit-change num ${chgCls}`}>{chgTxt}</div>
          </div>
        </div>
      );
    }

    function State({ emoji, title, body, action }) {
      return (
        <div className="state">
          <div className="state-emoji">{emoji}</div>
          <div className="state-title">{title}</div>
          <div className="state-body">{body}</div>
          {action}
        </div>
      );
    }

    function App() {
      const [selectedId, setSelectedId] = useState(STRATEGIES[0].id);
      // 每個策略有獨立 param value（切回去保留你調過的設定）
      const [paramValues, setParamValues] = useState(
        Object.fromEntries(STRATEGIES.map(s => [s.id, s.param.default]))
      );
      const strategy = STRATEGY_BY_ID[selectedId];
      const paramValue = paramValues[selectedId];
      const setParamValue = (v) => setParamValues(p => ({ ...p, [selectedId]: v }));

      const [hits, setHits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);
      const [error, setError] = useState(null);
      const [status, setStatus] = useState(null);
      const [marketOpen, setMarketOpen] = useState(false);
      const [universeSize, setUniverseSize] = useState(50);
      const [lastFetch, setLastFetch] = useState(null);
      const [untilTime, setUntilTime] = useState(null);
      const [dataDate, setDataDate] = useState(null);

      const [notifPerm, setNotifPerm] = useState(
        typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
      );

      useTick(5000);

      const reqIdRef     = useRef(0);
      const seenHitsRef  = useRef(new Set());
      const firstLoadRef = useRef(true);

      // 通知 effect — 偵測新命中（不在 strategy-namespaced seen set 裡）就彈
      useEffect(() => {
        if (firstLoadRef.current) {
          firstLoadRef.current = false;
          hits.forEach(h => seenHitsRef.current.add(`${selectedId}:${h.id}`));
          return;
        }
        if (notifPerm !== 'granted' || !marketOpen) return;

        const newHits = hits.filter(h => !seenHitsRef.current.has(`${selectedId}:${h.id}`));
        newHits.forEach(h => {
          seenHitsRef.current.add(`${selectedId}:${h.id}`);
          try {
            const chg = h.change_pct;
            const chgStr = chg == null ? '' : (chg >= 0 ? ` +${chg.toFixed(2)}%` : ` ${chg.toFixed(2)}%`);
            // 各策略的主指標摘要
            let detail = '';
            if (selectedId === 'opening-volume-burst' || selectedId === 'vwap-reversal') {
              detail = ` 量比 ${h.volume_ratio?.toFixed(2)}x`;
            } else if (selectedId === 'gap-up-continuation') {
              detail = ` 跳空 +${h.gap_pct?.toFixed(2)}%`;
            } else if (selectedId === 'intraday-breakout') {
              detail = ` 突破 +${h.breakout_pct?.toFixed(2)}%`;
            }
            new Notification(strategy.notifTitle, {
              body:  `${h.id} ${h.name} ${detail}${chgStr}`,
              tag:   `daytrade-${selectedId}-${h.id}`,
              icon:  '/icon-192.png',
              badge: '/icon-192.png',
              silent: false,
            });
          } catch (e) { /* iOS Safari may throw outside PWA */ }
        });
      }, [hits, notifPerm, marketOpen, selectedId, strategy.notifTitle]);

      const requestNotif = async () => {
        if (typeof Notification === 'undefined') return;
        try {
          const p = await Notification.requestPermission();
          setNotifPerm(p);
        } catch (e) { /* ignore */ }
      };

      const load = useCallback(async (sid, v, isAuto = false) => {
        const s = STRATEGY_BY_ID[sid];
        const id = ++reqIdRef.current;
        if (isAuto) setRefreshing(true); else setLoading(true);
        setError(null);
        try {
          const url = `${s.endpoint}?${s.param.key}=${v.toFixed(1)}`;
          const d = await apiFetch(url);
          if (id !== reqIdRef.current) return;
          setStatus(d.status);
          setHits(d.hits || []);
          setMarketOpen(!!d.market_open);
          if (d.universe_size) setUniverseSize(d.universe_size);
          setLastFetch(Date.now());
          setUntilTime(d.until_time || null);
          const firstDate = (d.hits || [])[0]?.data_date;
          if (firstDate) setDataDate(firstDate);
        } catch (e) {
          if (id !== reqIdRef.current) return;
          setError(e?.message || String(e));
        } finally {
          if (id === reqIdRef.current) {
            setLoading(false); setRefreshing(false);
          }
        }
      }, []);

      useEffect(() => { load(selectedId, paramValue, false); }, []);

      useEffect(() => {
        // 切策略時：reset firstLoad（initial 不發通知）+ 重抓
        firstLoadRef.current = true;
        setHits([]);
        const t = setTimeout(() => load(selectedId, paramValue, false), 200);
        return () => clearTimeout(t);
      }, [selectedId]);

      useEffect(() => {
        const t = setTimeout(() => load(selectedId, paramValue, false), 350);
        return () => clearTimeout(t);
      }, [paramValue]);

      useEffect(() => {
        if (!marketOpen) return;
        const iv = setInterval(() => load(selectedId, paramValue, true), 60_000);
        return () => clearInterval(iv);
      }, [marketOpen, selectedId, paramValue, load]);

      const renderBody = () => {
        if (loading && hits.length === 0) {
          return (
            <>
              <div className="hit"><div style={{flex:1, height:60}} className="skel" /></div>
              <div className="hit"><div style={{flex:1, height:60}} className="skel" /></div>
              <div className="hit"><div style={{flex:1, height:60}} className="skel" /></div>
            </>
          );
        }
        if (error) {
          return <State emoji="⚠️" title="連線失敗"
            body={`無法連到 Mac backend。確認 Mac 開機 + ngrok 在跑。\n錯誤: ${error}`}
            action={<button className="btn-retry" onClick={() => load(selectedId, paramValue, false)}>重試</button>}
          />;
        }
        if (status === 'render-not-supported') {
          return <State emoji="🔌" title="Mac backend 不可用"
            body="當沖掃描需 yfinance 即時資料源，Render 上資料源被擋。請確認 Mac+ngrok 在線。"
            action={<button className="btn-retry" onClick={() => load(selectedId, paramValue, false)}>重試</button>}
          />;
        }
        if (status === 'pre-market') {
          return <State emoji="⏰" title="盤前集合競價中"
            body="9:05 後開始有資料。9:00-9:05 集合競價成交後、量能還不足以判斷。" />;
        }
        if (hits.length === 0) {
          const hint = marketOpen
            ? `這個條件下還沒有股票觸發。試試調整門檻，或等量能累積。`
            : `${dataDate ? dataDate + ' 收盤' : '最近交易日'}全日沒有命中此策略。試試調整門檻。`;
          return <State emoji="🌙" title="目前沒有命中" body={hint} />;
        }
        return hits.map(h => <HitCard key={h.id} hit={h} strategy={strategy} />);
      };

      return (
        <div className="app">
          <div className="header">
            <div className="title-row">
              <div className="title">當沖<em>掃描</em></div>
              {refreshing && <span className="spin" />}
            </div>
            <div className="subtitle">{strategy.emoji} {strategy.label} — 台灣 50 ({universeSize})</div>

            <div className="status-row">
              <MarketPill status={status} marketOpen={marketOpen} />
              {untilTime && (
                <span className="pill">
                  <span className="label num">{untilTime}</span>
                </span>
              )}
              <span className="pill tap" onClick={() => load(selectedId, paramValue, false)}>
                <span className="num">{lastFetch ? fmtRelative(lastFetch) : '—'}</span>
              </span>
              {dataDate && !marketOpen && (
                <span className="pill">
                  <span className="num">{dataDate}</span>
                </span>
              )}
              {notifPerm === 'default' && (
                <span className="pill tap notif-cta" onClick={requestNotif}>
                  <span className="label">🔔 啟用命中通知</span>
                </span>
              )}
              {notifPerm === 'granted' && (
                <span className="pill notif-on">
                  <span className="label">🔔 通知中</span>
                </span>
              )}
              {notifPerm === 'denied' && (
                <span className="pill notif-off">
                  <span className="label">🔕 通知封鎖</span>
                </span>
              )}
            </div>
          </div>

          <StrategyTabs selectedId={selectedId} onSelect={setSelectedId} />

          <ParamCard strategy={strategy} value={paramValue} onChange={setParamValue} />

          <div className="list-head">
            <span className="list-title">命中列表</span>
            <span className="list-count">
              <em>{hits.length}</em> 檔 / {universeSize}
            </span>
          </div>

          {renderBody()}

          <div className="footer">
            {strategy.emoji} {strategy.label} · {strategy.param.label} {paramValue.toFixed(1)}{strategy.param.unit} · 60s 自動刷新
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
